<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INDIAN BLANKOS</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1220;color:white;}

header{
display:flex;justify-content:space-between;align-items:center;
padding:20px 40px;background:#0f172a;
position:sticky;top:0;
}
header h1{color:#3b82f6;}

nav button{
background:none;border:none;color:white;
margin-left:20px;cursor:pointer;font-size:16px;
}
nav button:hover{color:#3b82f6;}

.section{display:none;padding:40px;}
.active{display:block;}

.hero{
height:70vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;text-align:center;
}
.hero h2{font-size:70px;color:#3b82f6;}
.hero p{color:#94a3b8;}

.search-box{
margin-top:30px;width:60%;max-width:600px;
}
.search-box input{
width:100%;padding:15px;border-radius:5px;border:none;
}

.suggestions{
background:#1e293b;border-radius:5px;margin-top:5px;
max-height:200px;overflow:auto;
}
.suggestions div{padding:10px;cursor:pointer;}
.suggestions div:hover{background:#3b82f6;color:black;}

.results{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1e293b;border-radius:10px;overflow:hidden;
}
.card img{
width:100%;height:300px;object-fit:cover;
}
.card h4{padding:10px;}
</style>
</head>

<body>

<header>
<h1>INDIAN BLANKOS</h1>
<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('engine')">Engine</button>
</nav>
</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="hero">
<h2>INDIAN BLANKOS</h2>
<p>Directors spark of thought to crafting reality</p>
</div>

<h2 style="text-align:center;color:#3b82f6;">Our Mission</h2>
<p style="text-align:center;max-width:700px;margin:auto;">
INDIAN BLANKOS maps Indian cinema at scale — connecting directors and films into one powerful discovery engine.
</p>
</div>

<!-- ENGINE -->
<div id="engine" class="section">
<h2 style="text-align:center;color:#3b82f6;">Search Directors</h2>

<div class="search-box" style="margin:auto;">
<input id="search" placeholder="Search directors or movies...">
<div id="suggestions" class="suggestions"></div>
</div>

<div id="results" class="results"></div>
</div>

<script>

/* NAVIGATION */
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* NAME GENERATOR (INDIAN STYLE) */
const firstNames=[
"Arjun","Ravi","Kiran","Vikram","Ajay","Rohan","Sanjay","Amit","Raj","Manoj",
"Deepak","Naveen","Karthik","Siddharth","Varun","Aditya","Rakesh","Prakash",
"Mahesh","Anil","Rahul","Vivek","Suresh","Harish","Girish"
];

const lastNames=[
"Kumar","Reddy","Sharma","Verma","Menon","Iyer","Naidu","Shetty","Kapoor",
"Chopra","Mehta","Nair","Rao","Joshi","Das","Bose","Ghosh","Patel","Singh",
"Yadav","Kulkarni","Desai","Pillai","Bhatt","Mishra"
];

/* GENERATE 1000 UNIQUE DIRECTORS */
const directors=[];

for(let i=0;i<1000;i++){
let name = 
firstNames[Math.floor(Math.random()*firstNames.length)] + " " +
lastNames[Math.floor(Math.random()*lastNames.length)] + " " + i;

directors.push({
name:name,
movies:[
{
title:"Blockbuster "+i,
poster:"https://via.placeholder.com/300x450?text=Blockbuster"
},
{
title:"Drama "+i,
poster:"https://via.placeholder.com/300x450?text=Drama"
},
{
title:"Action "+i,
poster:"https://via.placeholder.com/300x450?text=Action"
}
]
});
}

/* SEARCH */
const input=document.getElementById("search");
const sug=document.getElementById("suggestions");
const res=document.getElementById("results");

input.addEventListener("input",()=>{
let val=input.value.toLowerCase();
sug.innerHTML="";

if(!val) return;

let matches=directors.filter(d=>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
).slice(0,10);

matches.forEach(d=>{
let div=document.createElement("div");
div.innerHTML=`<b>${d.name}</b><br><small>${d.movies[0].title}</small>`;
div.onclick=()=>showMovies(d);
sug.appendChild(div);
});
});

/* SHOW MOVIES */
function showMovies(d){
input.value=d.name;
sug.innerHTML="";
res.innerHTML="";

d.movies.forEach(m=>{
res.innerHTML+=`
<div class="card">
<img src="${m.poster}">
<h4>${m.title}</h4>
</div>`;
});
}

</script>

</body>
</html>
