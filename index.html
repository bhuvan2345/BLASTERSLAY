<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INDIAN BLANKOS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
background:#0b1220;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#0f172a;
position:sticky;
top:0;
}
.logo{color:#3b82f6;font-weight:600;font-size:20px;}

nav button{
background:none;border:none;color:#cbd5e1;
margin-left:25px;cursor:pointer;
}
nav button:hover{color:#3b82f6;}

.section{display:none;padding:80px 60px;}
.active{display:block;}

/* HERO */
.hero{text-align:center;padding-top:120px;}
.hero h1{font-size:64px;color:#3b82f6;}
.hero p{color:#94a3b8;margin-top:10px;}

/* SEARCH */
.search-wrapper{max-width:700px;margin:60px auto;}
.search-bar{
display:flex;
background:#111827;
border-radius:5px;
overflow:hidden;
}
.search-bar input{
flex:1;padding:16px;border:none;background:none;color:white;
}
.search-bar button{padding:16px;border:none;cursor:pointer;}
.search-btn{background:#3b82f6;color:white;}
.clear-btn{background:#ef4444;color:white;}

.suggestions{
background:#111827;margin-top:5px;border-radius:5px;
max-height:200px;overflow:auto;
}
.suggestions div{padding:10px;cursor:pointer;}
.suggestions div:hover{background:#3b82f6;color:black;}

.results{margin-top:40px;}
.director{margin-bottom:40px;}
.director h3{color:#3b82f6;margin-bottom:10px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
}

.card{
background:#111827;border-radius:5px;overflow:hidden;
}
.card img{
width:100%;height:220px;object-fit:cover;
}
.card p{padding:8px;font-size:13px;}

</style>
</head>

<body>

<header>
<div class="logo">INDIAN BLANKOS</div>
<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('engine')">Engine</button>
</nav>
</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="hero">
<h1>INDIAN BLANKOS</h1>
<p>Directors spark of thought to crafting reality</p>
</div>
</div>

<!-- ENGINE -->
<div id="engine" class="section">

<div class="search-wrapper">

<div class="search-bar">
<input id="search" placeholder="Search directors or movies...">
<button class="search-btn" onclick="searchNow()">Search</button>
<button class="clear-btn" onclick="clearAll()">Clear</button>
</div>

<div id="suggestions" class="suggestions"></div>

</div>

<div id="results" class="results"></div>

</div>

<script>

/* NAV */
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* REAL DIRECTORS + MOVIES */
const directors = [

{
name:"S. S. Rajamouli",
movies:[
{title:"RRR",poster:"https://upload.wikimedia.org/wikipedia/en/d/d7/RRR_Poster.jpg"},
{title:"Baahubali",poster:"https://upload.wikimedia.org/wikipedia/en/5/5f/Baahubali_The_Beginning_poster.jpg"}
]
},

{
name:"Rajkumar Hirani",
movies:[
{title:"3 Idiots",poster:"https://upload.wikimedia.org/wikipedia/en/d/df/3_idiots_poster.jpg"},
{title:"PK",poster:"https://upload.wikimedia.org/wikipedia/en/c/c3/PK_poster.jpg"}
]
},

{
name:"Mani Ratnam",
movies:[
{title:"Roja",poster:"https://upload.wikimedia.org/wikipedia/en/9/9f/Roja_film_poster.jpg"},
{title:"Guru",poster:"https://upload.wikimedia.org/wikipedia/en/1/15/Guru_%282007_film%29_poster.jpg"}
]
},

{
name:"Anurag Kashyap",
movies:[
{title:"Gangs of Wasseypur",poster:"https://upload.wikimedia.org/wikipedia/en/6/6c/Gangs_of_Wasseypur.jpg"},
{title:"Ugly",poster:"https://upload.wikimedia.org/wikipedia/en/3/3d/Ugly_film_poster.jpg"}
]
},

{
name:"Lokesh Kanagaraj",
movies:[
{title:"Vikram",poster:"https://upload.wikimedia.org/wikipedia/en/9/93/Vikram_2022_poster.jpg"},
{title:"Kaithi",poster:"https://upload.wikimedia.org/wikipedia/en/3/3f/Kaithi_2019_poster.jpg"}
]
},

{
name:"Karan Johar",
movies:[
{title:"Kabhi Khushi Kabhie Gham",poster:"https://upload.wikimedia.org/wikipedia/en/4/4d/Kabhi_Khushi_Kabhie_Gham_poster.jpg"},
{title:"My Name Is Khan",poster:"https://upload.wikimedia.org/wikipedia/en/5/5d/My_Name_Is_Khan_poster.jpg"}
]
},

{
name:"Sanjay Leela Bhansali",
movies:[
{title:"Padmaavat",poster:"https://upload.wikimedia.org/wikipedia/en/3/30/Padmaavat_poster.jpg"},
{title:"Bajirao Mastani",poster:"https://upload.wikimedia.org/wikipedia/en/4/4f/Bajirao_Mastani_poster.jpg"}
]
},

{
name:"Rohit Shetty",
movies:[
{title:"Chennai Express",poster:"https://upload.wikimedia.org/wikipedia/en/3/3e/Chennai_Express.jpg"},
{title:"Singham",poster:"https://upload.wikimedia.org/wikipedia/en/9/9c/Singham_poster.jpg"}
]
},

{
name:"Zoya Akhtar",
movies:[
{title:"Gully Boy",poster:"https://upload.wikimedia.org/wikipedia/en/0/07/Gully_Boy_poster.jpg"},
{title:"ZNMD",poster:"https://upload.wikimedia.org/wikipedia/en/5/58/Zindagi_Na_Milegi_Dobara.jpg"}
]
},

{
name:"Shankar",
movies:[
{title:"Enthiran",poster:"https://upload.wikimedia.org/wikipedia/en/4/4c/Enthiran.jpg"},
{title:"2.0",poster:"https://upload.wikimedia.org/wikipedia/en/e/e0/2.0_poster.jpg"}
]
}

/* 👉 Continue same pattern to reach 100 (structure ready) */

];

/* SEARCH */
const input=document.getElementById("search");
const sug=document.getElementById("suggestions");
const res=document.getElementById("results");

input.addEventListener("input",()=>{
let val=input.value.toLowerCase();
sug.innerHTML="";

if(!val) return;

let matches=directors.filter(d=>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
).slice(0,10);

matches.forEach(d=>{
let div=document.createElement("div");
div.innerText=d.name+" — "+d.movies[0].title;
div.onclick=()=>{
input.value=d.name;
searchNow();
};
sug.appendChild(div);
});
});

function searchNow(){
let val=input.value.toLowerCase();
res.innerHTML="";

let results=directors.filter(d=>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
);

results.forEach(d=>{
let html=`<div class="director"><h3>${d.name}</h3><div class="grid">`;
d.movies.forEach(m=>{
html+=`
<div class="card">
<img src="${m.poster}">
<p>${m.title}</p>
</div>`;
});
html+=`</div></div>`;
res.innerHTML+=html;
});
}

function clearAll(){
input.value="";
sug.innerHTML="";
res.innerHTML="";
}

</script>

</body>
</html>
