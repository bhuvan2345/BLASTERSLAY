<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INDIAN BLANKOS</title>

<!-- Poppins Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0b1220;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#0f172a;
position:sticky;
top:0;
z-index:10;
}
header h1{
color:#3b82f6;
font-weight:600;
}

nav button{
background:none;
border:none;
color:white;
margin-left:20px;
cursor:pointer;
font-size:15px;
font-weight:400;
}
nav button:hover{color:#3b82f6;}

/* SECTION CONTROL */
.section{
display:none;
padding:40px;
}
.active{display:block;}

/* HERO */
.hero{
height:75vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
.hero h2{
font-size:64px;
color:#3b82f6;
font-weight:600;
}
.hero p{
color:#94a3b8;
margin-top:10px;
}

/* SEARCH */
.search-box{
margin-top:30px;
width:60%;
max-width:600px;
}

.search-box input{
width:100%;
padding:14px;
border-radius:5px;
border:none;
outline:none;
font-family:'Poppins';
}

/* SUGGESTIONS */
.suggestions{
background:#1e293b;
border-radius:5px;
margin-top:5px;
max-height:200px;
overflow:auto;
}

.suggestions div{
padding:10px;
cursor:pointer;
font-size:14px;
}

.suggestions div:hover{
background:#3b82f6;
color:black;
}

/* RESULTS */
.results{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}
.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card h4{
padding:12px;
font-weight:400;
}
</style>
</head>

<body>

<header>
<h1>INDIAN BLANKOS</h1>

<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('engine')">Engine</button>
</nav>
</header>

<!-- HOME -->
<div id="home" class="section active">

<div class="hero">
<h2>INDIAN BLANKOS</h2>
<p>Directors spark of thought to crafting reality</p>
</div>

<h2 style="text-align:center;color:#3b82f6;">Our Mission</h2>
<p style="text-align:center;max-width:700px;margin:auto;">
INDIAN BLANKOS connects Indian cinema by mapping directors and their creations into a powerful discovery engine.
</p>

</div>

<!-- ENGINE -->
<div id="engine" class="section">

<h2 style="text-align:center;color:#3b82f6;">Search Directors</h2>

<div class="search-box" style="margin:auto;">
<input id="search" placeholder="Search directors or movies...">
<div id="suggestions" class="suggestions"></div>
</div>

<div id="results" class="results"></div>

</div>

<script>

/* NAVIGATION */
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* BASE REAL DIRECTORS + MOVIES */
const baseData = [

{
name:"S. S. Rajamouli",
movies:[
{title:"RRR",poster:"https://upload.wikimedia.org/wikipedia/en/d/d7/RRR_Poster.jpg"},
{title:"Baahubali",poster:"https://upload.wikimedia.org/wikipedia/en/5/5f/Baahubali_The_Beginning_poster.jpg"}
]
},

{
name:"Rajkumar Hirani",
movies:[
{title:"3 Idiots",poster:"https://upload.wikimedia.org/wikipedia/en/d/df/3_idiots_poster.jpg"},
{title:"PK",poster:"https://upload.wikimedia.org/wikipedia/en/c/c3/PK_poster.jpg"}
]
},

{
name:"Mani Ratnam",
movies:[
{title:"Roja",poster:"https://upload.wikimedia.org/wikipedia/en/9/9f/Roja_film_poster.jpg"},
{title:"Guru",poster:"https://upload.wikimedia.org/wikipedia/en/1/15/Guru_%282007_film%29_poster.jpg"}
]
},

{
name:"Lokesh Kanagaraj",
movies:[
{title:"Vikram",poster:"https://upload.wikimedia.org/wikipedia/en/9/93/Vikram_2022_poster.jpg"},
{title:"Kaithi",poster:"https://upload.wikimedia.org/wikipedia/en/3/3f/Kaithi_2019_poster.jpg"}
]
},

{
name:"Karan Johar",
movies:[
{title:"Kabhi Khushi Kabhie Gham",poster:"https://upload.wikimedia.org/wikipedia/en/4/4d/Kabhi_Khushi_Kabhie_Gham_poster.jpg"},
{title:"My Name Is Khan",poster:"https://upload.wikimedia.org/wikipedia/en/5/5d/My_Name_Is_Khan_poster.jpg"}
]
}

];

/* EXPAND TO ~1000 DATA */
const directors=[];
for(let i=0;i<200;i++){
baseData.forEach(d=>{
directors.push({
name:d.name+" "+i,
movies:d.movies
});
});
}

/* SEARCH */
const input=document.getElementById("search");
const sug=document.getElementById("suggestions");
const res=document.getElementById("results");

input.addEventListener("input",()=>{
let val=input.value.toLowerCase();
sug.innerHTML="";

if(!val) return;

let matches=directors.filter(d=>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
).slice(0,10);

matches.forEach(d=>{
let div=document.createElement("div");
div.innerHTML=`<b>${d.name}</b><br><small>${d.movies[0].title}</small>`;
div.onclick=()=>showMovies(d);
sug.appendChild(div);
});
});

/* SHOW MOVIES */
function showMovies(d){
input.value=d.name;
sug.innerHTML="";
res.innerHTML="";

d.movies.forEach(m=>{
res.innerHTML+=`
<div class="card">
<img src="${m.poster}">
<h4>${m.title}</h4>
</div>`;
});
}

</script>

</body>
</html>
