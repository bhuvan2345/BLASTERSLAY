<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INDIAN BLANKOS</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1220;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#0f172a;
}
header h1{color:#3b82f6;}

/* HERO */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h2{
font-size:70px;
color:#3b82f6;
}

.hero p{
color:#94a3b8;
}

/* SEARCH */
.search-box{
margin-top:30px;
width:60%;
max-width:600px;
}

.search-box input{
width:100%;
padding:15px;
border-radius:5px;
border:none;
}

/* SUGGESTIONS */
.suggestions{
background:#1e293b;
border-radius:5px;
margin-top:5px;
max-height:200px;
overflow:auto;
}

.suggestions div{
padding:10px;
cursor:pointer;
}

.suggestions div:hover{
background:#3b82f6;
color:black;
}

/* GRID */
.results{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card h4{
padding:10px;
}
</style>
</head>

<body>

<header>
<h1>INDIAN BLANKOS</h1>
</header>

<section class="hero">
<h2>INDIAN BLANKOS</h2>
<p>Directors spark of thought to crafting reality</p>

<div class="search-box">
<input id="search" placeholder="Search directors or movies...">
<div id="suggestions" class="suggestions"></div>
</div>

<div id="results" class="results"></div>
</section>

<section style="padding:40px;text-align:center;">
<h2 style="color:#3b82f6;">Our Mission</h2>
<p>
INDIAN BLANKOS connects Indian cinema at scale — mapping directors, movies, and creativity across industries.
</p>
</section>

<script>

/* MASS DATA SIMULATION (LIKE 100K SCALE STRUCTURE) */
const directors = [];

// sample real + auto-generated expansion
const base = [
{ name:"S. S. Rajamouli", movies:["RRR","Baahubali","Eega"] },
{ name:"Rajkumar Hirani", movies:["3 Idiots","PK","Sanju"] },
{ name:"Mani Ratnam", movies:["Roja","Guru","Bombay"] },
{ name:"Lokesh Kanagaraj", movies:["Vikram","Kaithi","Leo"] },
{ name:"Anurag Kashyap", movies:["Gangs of Wasseypur","Ugly"] }
];

// expand to simulate large dataset
for(let i=0;i<2000;i++){
base.forEach(d=>{
directors.push({
name:d.name+" "+i,
movies:d.movies.map(m=>({
title:m+" "+i,
poster:"https://via.placeholder.com/300x450?text="+m
}))
});
});
}

/* SEARCH */
const input=document.getElementById("search");
const sug=document.getElementById("suggestions");
const res=document.getElementById("results");

input.addEventListener("input",()=>{
let val=input.value.toLowerCase();
sug.innerHTML="";

if(!val) return;

let matches=directors.filter(d=>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
).slice(0,10);

matches.forEach(d=>{
let div=document.createElement("div");
div.innerHTML=`<b>${d.name}</b><br><small>${d.movies[0].title}</small>`;
div.onclick=()=>showMovies(d);
sug.appendChild(div);
});
});

function showMovies(d){
input.value=d.name;
sug.innerHTML="";
res.innerHTML="";

d.movies.forEach(m=>{
res.innerHTML+=`
<div class="card">
<img src="${m.poster}">
<h4>${m.title}</h4>
</div>`;
});
}

</script>

</body>
</html>
