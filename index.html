<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INDIAN BLANKOS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0b1220;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#0f172a;
position:sticky;
top:0;
}
header h1{color:#3b82f6;}

nav button{
background:none;border:none;color:white;margin-left:20px;cursor:pointer;
}
nav button:hover{color:#3b82f6;}

/* SECTION */
.section{display:none;padding:50px;}
.active{display:block;}

/* HERO */
.hero{text-align:center;margin-top:100px;}
.hero h1{font-size:60px;color:#3b82f6;}
.hero p{color:#94a3b8;}

/* SEARCH */
.search-box{
margin:30px auto;
width:60%;
max-width:600px;
}

.search-row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border-radius:5px;
border:none;
}

button.search-btn,button.clear-btn{
padding:14px;
border:none;
border-radius:5px;
cursor:pointer;
}

.search-btn{background:#3b82f6;color:white;}
.clear-btn{background:#ef4444;color:white;}

.suggestions{
background:#1e293b;
border-radius:5px;
margin-top:5px;
max-height:200px;
overflow:auto;
}
.suggestions div{padding:10px;cursor:pointer;}
.suggestions div:hover{background:#3b82f6;color:black;}

/* RESULTS */
.results{
margin-top:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card h4{padding:10px;}

.director-title{
margin-top:20px;
font-size:20px;
color:#3b82f6;
}

/* ICONS */
.icons{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

.icon-box{
text-align:center;
}

.icon-box i{
font-size:30px;
color:#3b82f6;
}

</style>
</head>

<body>

<header>
<h1>INDIAN BLANKOS</h1>
<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('engine')">Engine</button>
<button onclick="showSection('about')">About</button>
</nav>
</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="hero">
<h1>INDIAN BLANKOS</h1>
<p>Directors spark of thought to crafting reality</p>
</div>

<div class="icons">
<div class="icon-box">🎬<p>Directors</p></div>
<div class="icon-box">📊<p>Film Data</p></div>
<div class="icon-box">🌍<p>Indian Cinema</p></div>
</div>
</div>

<!-- ENGINE -->
<div id="engine" class="section">

<h2 style="text-align:center;color:#3b82f6;">Search Engine</h2>

<div class="search-box">

<div class="search-row">
<input id="search" placeholder="Search directors or movies...">
<button class="search-btn" onclick="performSearch()">Search</button>
<button class="clear-btn" onclick="clearSearch()">Clear</button>
</div>

<div id="suggestions" class="suggestions"></div>

</div>

<div id="results" class="results"></div>

</div>

<!-- ABOUT -->
<div id="about" class="section">
<h2 style="color:#3b82f6;text-align:center;">About</h2>
<p style="max-width:700px;margin:auto;text-align:center;">
INDIAN BLANKOS is a cinematic intelligence platform mapping Indian directors and films into one discovery engine.
</p>
</div>

<script>

/* NAV */
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* DATA */
const base=[
{
name:"S. S. Rajamouli",
movies:[
{title:"RRR",poster:"https://upload.wikimedia.org/wikipedia/en/d/d7/RRR_Poster.jpg"},
{title:"Baahubali",poster:"https://upload.wikimedia.org/wikipedia/en/5/5f/Baahubali_The_Beginning_poster.jpg"}
]
},
{
name:"Rajkumar Hirani",
movies:[
{title:"3 Idiots",poster:"https://upload.wikimedia.org/wikipedia/en/d/df/3_idiots_poster.jpg"},
{title:"PK",poster:"https://upload.wikimedia.org/wikipedia/en/c/c3/PK_poster.jpg"}
]
}
];

const directors=[];
for(let i=0;i<500;i++){
base.forEach(d=>{
directors.push({
name:d.name+" "+i,
movies:d.movies
});
});
}

/* SEARCH LOGIC */
const input=document.getElementById("search");
const sug=document.getElementById("suggestions");
const res=document.getElementById("results");

input.addEventListener("input",showSuggestions);

function showSuggestions(){
let val=input.value.toLowerCase();
sug.innerHTML="";
if(!val) return;

let matches=directors.filter(d=>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
).slice(0,10);

matches.forEach(d=>{
let div=document.createElement("div");
div.innerHTML=`<b>${d.name}</b> — ${d.movies[0].title}`;
div.onclick=()=>{
input.value=d.name;
performSearch();
};
sug.appendChild(div);
});
}

function performSearch(){
let val=input.value.toLowerCase();
res.innerHTML="";

let results=directors.filter(d=>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
).slice(0,5);

results.forEach(d=>{
res.innerHTML+=`<div class="director-title">${d.name}</div><div class="grid">`;

d.movies.forEach(m=>{
res.innerHTML+=`
<div class="card">
<img src="${m.poster}">
<h4>${m.title}</h4>
</div>`;
});

res.innerHTML+=`</div>`;
});
}

function clearSearch(){
input.value="";
sug.innerHTML="";
res.innerHTML="";
}

</script>

</body>
</html>
