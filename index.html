<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INDIAN BLANKOS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0b1220;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px 50px;
background:#0f172a;
position:sticky;
top:0;
z-index:10;
}
header h1{color:#3b82f6;font-weight:600;}

nav button{
background:none;border:none;color:white;margin-left:20px;cursor:pointer;
}
nav button:hover{color:#3b82f6;}

/* SECTIONS */
.section{display:none;padding:60px;}
.active{display:block;}

/* HERO */
.hero{
text-align:center;
padding-top:120px;
}
.hero h1{
font-size:72px;
color:#3b82f6;
margin-bottom:10px;
}
.hero p{
font-size:18px;
color:#94a3b8;
}

/* ICONS */
.icons{
display:flex;
justify-content:center;
gap:60px;
margin-top:50px;
}
.icon{
width:50px;
height:50px;
fill:#3b82f6;
}

/* SEARCH */
.search-box{
margin:40px auto;
width:60%;
max-width:700px;
}

.search-row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border-radius:5px;
border:none;
}

button{
border:none;
border-radius:5px;
padding:14px;
cursor:pointer;
}

.search-btn{background:#3b82f6;color:white;}
.clear-btn{background:#ef4444;color:white;}

.suggestions{
background:#1e293b;
border-radius:5px;
margin-top:5px;
max-height:200px;
overflow:auto;
}

.suggestions div{
padding:10px;
cursor:pointer;
}

.suggestions div:hover{
background:#3b82f6;
color:black;
}

/* RESULTS */
.results{margin-top:30px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
}

.card{
background:#1e293b;
border-radius:5px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h4{
padding:8px;
font-size:13px;
}

.director-title{
margin:20px 0 10px;
color:#3b82f6;
font-size:18px;
}
</style>
</head>

<body>

<header>
<h1>INDIAN BLANKOS</h1>
<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('engine')">Engine</button>
</nav>
</header>

<!-- HOME -->
<div id="home" class="section active">

<div class="hero">
<h1>INDIAN BLANKOS</h1>
<p>Directors spark of thought to crafting reality</p>
</div>

<div class="icons">
<svg class="icon" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/></svg>
<svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 22h20z"/></svg>
<svg class="icon" viewBox="0 0 24 24"><path d="M12 12l8-8H4z"/></svg>
</div>

</div>

<!-- ENGINE -->
<div id="engine" class="section">

<h2 style="text-align:center;color:#3b82f6;">Search Engine</h2>

<div class="search-box">

<div class="search-row">
<input id="search" placeholder="Search directors or movies...">
<button class="search-btn" onclick="searchNow()">Search</button>
<button class="clear-btn" onclick="clearAll()">Clear</button>
</div>

<div id="suggestions" class="suggestions"></div>

</div>

<div id="results" class="results"></div>

</div>

<script>

/* NAV */
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* 100 DIRECTORS DATA */
const directors = [];

const base = [
"S. S. Rajamouli","Rajkumar Hirani","Mani Ratnam","Anurag Kashyap",
"Lokesh Kanagaraj","Karan Johar","Zoya Akhtar","Rohit Shetty",
"Sanjay Leela Bhansali","Priyadarshan"
];

const posters = [
"https://upload.wikimedia.org/wikipedia/en/d/d7/RRR_Poster.jpg",
"https://upload.wikimedia.org/wikipedia/en/d/df/3_idiots_poster.jpg",
"https://upload.wikimedia.org/wikipedia/en/9/9f/Roja_film_poster.jpg",
"https://upload.wikimedia.org/wikipedia/en/9/93/Vikram_2022_poster.jpg",
"https://upload.wikimedia.org/wikipedia/en/4/4d/Kabhi_Khushi_Kabhie_Gham_poster.jpg"
];

for(let i=0;i<100;i++){
directors.push({
name: base[i % base.length] + " " + i,
movies:[
{title:"Film "+i, poster:posters[i % posters.length]},
{title:"Cinema "+i, poster:posters[(i+1)%posters.length]},
{title:"Story "+i, poster:posters[(i+2)%posters.length]}
]
});
}

/* SEARCH */
const input = document.getElementById("search");
const sug = document.getElementById("suggestions");
const res = document.getElementById("results");

input.addEventListener("input", ()=>{
let val = input.value.toLowerCase();
sug.innerHTML="";

if(!val) return;

let matches = directors.filter(d =>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
).slice(0,10);

matches.forEach(d=>{
let div=document.createElement("div");
div.innerHTML=`<b>${d.name}</b> — ${d.movies[0].title}`;
div.onclick=()=>{
input.value=d.name;
searchNow();
};
sug.appendChild(div);
});
});

function searchNow(){
let val=input.value.toLowerCase();
res.innerHTML="";

let results = directors.filter(d =>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
).slice(0,5);

results.forEach(d=>{
res.innerHTML+=`<div class="director-title">${d.name}</div><div class="grid">`;

d.movies.forEach(m=>{
res.innerHTML+=`
<div class="card">
<img src="${m.poster}">
<h4>${m.title}</h4>
</div>`;
});

res.innerHTML+=`</div>`;
});
}

function clearAll(){
input.value="";
sug.innerHTML="";
res.innerHTML="";
}

</script>

</body>
</html>
