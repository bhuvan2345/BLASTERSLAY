<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INDIAN BLANKOS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
background:#0b1220;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#0f172a;
position:sticky;
top:0;
}
.logo{
font-size:20px;
font-weight:600;
color:#3b82f6;
}

nav button{
background:none;
border:none;
color:#cbd5e1;
margin-left:25px;
font-size:14px;
cursor:pointer;
}
nav button:hover{color:#3b82f6;}

/* SECTIONS */
.section{display:none;padding:80px 60px;}
.active{display:block;}

/* HERO */
.hero{
max-width:900px;
margin:auto;
text-align:center;
padding-top:120px;
}

.hero h1{
font-size:64px;
font-weight:600;
color:#3b82f6;
letter-spacing:-1px;
}

.hero p{
margin-top:15px;
color:#94a3b8;
font-size:16px;
}

/* ICONS */
.features{
display:flex;
justify-content:center;
gap:80px;
margin-top:60px;
}

.feature{
text-align:center;
}

.feature svg{
width:40px;
height:40px;
fill:#3b82f6;
margin-bottom:10px;
}

/* SEARCH */
.search-wrapper{
max-width:700px;
margin:60px auto 0;
}

.search-bar{
display:flex;
background:#111827;
border-radius:5px;
overflow:hidden;
}

.search-bar input{
flex:1;
padding:16px;
border:none;
background:none;
color:white;
font-size:15px;
}

.search-bar button{
padding:16px 20px;
border:none;
cursor:pointer;
font-weight:500;
}

.search-btn{background:#3b82f6;color:white;}
.clear-btn{background:#ef4444;color:white;}

.suggestions{
background:#111827;
border-radius:5px;
margin-top:5px;
max-height:200px;
overflow:auto;
}

.suggestions div{
padding:12px;
cursor:pointer;
font-size:14px;
border-bottom:1px solid #1f2937;
}

.suggestions div:hover{
background:#3b82f6;
color:black;
}

/* RESULTS */
.results{
margin-top:50px;
}

.director{
margin-bottom:40px;
}

.director h3{
color:#3b82f6;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
}

.card{
background:#111827;
border-radius:5px;
overflow:hidden;
transition:0.2s;
}

.card:hover{transform:scale(1.03);}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card p{
padding:8px;
font-size:13px;
}

/* FOOTER */
.footer{
text-align:center;
margin-top:80px;
color:#6b7280;
font-size:13px;
}
</style>
</head>

<body>

<header>
<div class="logo">INDIAN BLANKOS</div>
<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('engine')">Engine</button>
</nav>
</header>

<!-- HOME -->
<div id="home" class="section active">

<div class="hero">
<h1>INDIAN BLANKOS</h1>
<p>Directors spark of thought to crafting reality</p>
</div>

<div class="features">

<div class="feature">
<svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/></svg>
<p>Directors</p>
</div>

<div class="feature">
<svg viewBox="0 0 24 24"><path d="M12 2L2 22h20z"/></svg>
<p>Films</p>
</div>

<div class="feature">
<svg viewBox="0 0 24 24"><path d="M12 12l8-8H4z"/></svg>
<p>Discovery</p>
</div>

</div>

</div>

<!-- ENGINE -->
<div id="engine" class="section">

<div class="search-wrapper">

<div class="search-bar">
<input id="search" placeholder="Search directors or movies...">
<button class="search-btn" onclick="searchNow()">Search</button>
<button class="clear-btn" onclick="clearAll()">Clear</button>
</div>

<div id="suggestions" class="suggestions"></div>

</div>

<div id="results" class="results"></div>

</div>

<div class="footer">
INDIAN BLANKOS — Cinema Intelligence Platform
</div>

<script>

/* NAVIGATION */
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* DATA (100 directors clean) */
const directors=[];
const names=["Rajamouli","Hirani","Ratnam","Kashyap","Johar","Shetty","Akhtar","Bhansali","Shankar","Menon"];

for(let i=0;i<100;i++){
directors.push({
name:"Director "+names[i%names.length]+" "+i,
movies:[
{title:"Film "+i,poster:"https://picsum.photos/300/450?random="+i},
{title:"Cinema "+i,poster:"https://picsum.photos/300/450?random="+(i+100)},
{title:"Story "+i,poster:"https://picsum.photos/300/450?random="+(i+200)}
]
});
}

/* SEARCH */
const input=document.getElementById("search");
const sug=document.getElementById("suggestions");
const res=document.getElementById("results");

input.addEventListener("input",()=>{
let val=input.value.toLowerCase();
sug.innerHTML="";
if(!val)return;

let matches=directors.filter(d=>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
).slice(0,8);

matches.forEach(d=>{
let div=document.createElement("div");
div.innerText=d.name+" — "+d.movies[0].title;
div.onclick=()=>{
input.value=d.name;
searchNow();
};
sug.appendChild(div);
});
});

function searchNow(){
let val=input.value.toLowerCase();
res.innerHTML="";

let results=directors.filter(d=>
d.name.toLowerCase().includes(val) ||
d.movies.some(m=>m.title.toLowerCase().includes(val))
).slice(0,5);

results.forEach(d=>{
let html=`<div class="director"><h3>${d.name}</h3><div class="grid">`;
d.movies.forEach(m=>{
html+=`
<div class="card">
<img src="${m.poster}">
<p>${m.title}</p>
</div>`;
});
html+=`</div></div>`;
res.innerHTML+=html;
});
}

function clearAll(){
input.value="";
sug.innerHTML="";
res.innerHTML="";
}

</script>

</body>
</html>
